<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Clock</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<button id="hamburgerBtn" class="hamburger" type="button" aria-label="Open settings" aria-expanded="false">☰</button>

<aside class="controls" id="settingsPanel" aria-hidden="true">
<div class="panel-header">
<h2>Settings</h2>
<button id="closePanelBtn" type="button" aria-label="Close settings">✕</button>
</div>
<button id="resetAllBtn" class="top-reset-btn" type="button">Reset All</button>

<div class="panel-section">
<div class="section-title-row">
<h3>Time</h3>
<label class="toggle" for="timeSettingsEnabled">
<input id="timeSettingsEnabled" type="checkbox" checked>
<span class="toggle-slider"></span>
</label>
</div>
<fieldset class="setting-grid" id="timeControls">

<label for="hourMode">Hour Mode</label>
<select id="hourMode">
<option value="24">24-hour</option>
<option value="12" selected>12-hour</option>
</select>

<label for="showSeconds">Show Seconds</label>
<select id="showSeconds">
<option value="on">On</option>
<option value="off" selected>Off</option>
</select>

<label for="showMeridiem">Show AM/PM</label>
<select id="showMeridiem">
<option value="on">On</option>
<option value="off" selected>Off</option>
</select>

<label for="blinkColon">Blink ":"</label>
<select id="blinkColon">
<option value="off" selected>Off</option>
<option value="on">On</option>
</select>

<label for="timeDraggable">Move Time Block</label>
<select id="timeDraggable">
<option value="off" selected>Off</option>
<option value="on">On</option>
</select>

<label for="resetTimePosBtn">Time Position</label>
<button id="resetTimePosBtn" type="button">Reset Center</button>
</fieldset>
</div>

<div class="panel-section" id="fontSection">
<div class="section-title-row">
<h3>Font</h3>
<label class="toggle" for="fontSettingsEnabled">
<input id="fontSettingsEnabled" type="checkbox" checked>
<span class="toggle-slider"></span>
</label>
</div>
<fieldset class="setting-grid" id="fontControls">

<label for="fontFamily">Font</label>
<select id="fontFamily">
<option value="Arial, sans-serif">Arial</option>
<option value="'Helvetica Neue', Helvetica, Arial, sans-serif">Helvetica Neue</option>
<option value="Georgia, serif">Georgia</option>
<option value="'Times New Roman', serif">Times New Roman</option>
<option value="'Courier New', monospace">Courier New</option>
</select>

<label for="fontWeight">Weight</label>
<select id="fontWeight">
<option value="300">Light</option>
<option value="400" selected>Regular</option>
<option value="500">Medium</option>
<option value="700">Bold</option>
<option value="900">Black</option>
</select>

<label for="fontSize">Size (px)</label>
<input id="fontSize" type="number" min="16" max="420" value="120">

<label for="lineHeight">Line Height</label>
<input id="lineHeight" type="number" min="0.8" max="2" step="0.05" value="1">

<label for="letterSpacing">Tracking (px)</label>
<input id="letterSpacing" type="number" min="-20" max="40" value="0">

<label for="fontStyle">Style</label>
<select id="fontStyle">
<option value="normal" selected>Normal</option>
<option value="italic">Italic</option>
</select>

<label for="textColor">Text Color</label>
<input id="textColor" type="color" value="#ffffff">

<label for="bgColor">Background</label>
<input id="bgColor" type="color" value="#000000">
</fieldset>

<div class="panel-actions">
<button id="pickTimeFontBtn" type="button">Load Time Font</button>
<button id="resetFontBtn" type="button">Reset Font</button>
</div>

<span id="fontStatus" aria-live="polite"></span>
<input id="timeFontFileInput" type="file" accept=".ttf,.otf,.woff,.woff2" hidden>
<input id="textFontFileInput" type="file" accept=".ttf,.otf,.woff,.woff2" hidden>
</div>

<div class="panel-section" id="textSection">
<div class="section-title-row">
<h3>Text</h3>
<label class="toggle" for="textSettingsEnabled">
<input id="textSettingsEnabled" type="checkbox" checked>
<span class="toggle-slider"></span>
</label>
</div>
<fieldset class="setting-grid" id="textControls">
<label for="customTextInput">Text Value</label>
<input id="customTextInput" type="text" placeholder="Type text to place">

<label for="textDefaultFont">Text Default Font</label>
<select id="textDefaultFont">
<option value="Arial, sans-serif">Arial</option>
<option value="'Helvetica Neue', Helvetica, Arial, sans-serif">Helvetica Neue</option>
<option value="Georgia, serif">Georgia</option>
<option value="'Times New Roman', serif">Times New Roman</option>
<option value="'Courier New', monospace">Courier New</option>
</select>

<label for="textSize">Text Size (px)</label>
<input id="textSize" type="number" min="10" max="420" value="38">

<label for="textTracking">Text Tracking (px)</label>
<input id="textTracking" type="number" min="-20" max="40" value="0">

<label for="textLineHeight">Text Line Height</label>
<input id="textLineHeight" type="number" min="0.8" max="2" step="0.05" value="1.1">

<label for="textWeight">Text Weight</label>
<select id="textWeight">
<option value="300">Light</option>
<option value="400" selected>Regular</option>
<option value="500">Medium</option>
<option value="700">Bold</option>
<option value="900">Black</option>
</select>

<label for="textStyle">Text Style</label>
<select id="textStyle">
<option value="normal" selected>Normal</option>
<option value="italic">Italic</option>
</select>

<label for="textFillColor">Text Color</label>
<input id="textFillColor" type="color" value="#ffffff">
</fieldset>
<div class="panel-actions">
<button id="pickTextFontBtn" type="button">Load Text Font</button>
<button id="addTextBtn" type="button">Add Text</button>
<button id="undoBtn" type="button">Undo</button>
</div>
<div id="textHistory" class="text-history"></div>
</div>
</aside>

<div id="panelBackdrop" class="panel-backdrop" hidden></div>

<div id="clock"><span id="timeHour">00</span><span id="timeMainColon">:</span><span id="timeMinute">00</span><span id="timeColon">:</span><span id="timeSeconds">00</span><span id="timeMeridiem"></span></div>

<script>
const clockEl = document.getElementById("clock");
const timeHourEl = document.getElementById("timeHour");
const timeMainColonEl = document.getElementById("timeMainColon");
const timeMinuteEl = document.getElementById("timeMinute");
const timeColonEl = document.getElementById("timeColon");
const timeSecondsEl = document.getElementById("timeSeconds");
const timeMeridiemEl = document.getElementById("timeMeridiem");
const controlsEl = document.querySelector(".controls");
const hamburgerBtnEl = document.getElementById("hamburgerBtn");
const closePanelBtnEl = document.getElementById("closePanelBtn");
const panelBackdropEl = document.getElementById("panelBackdrop");
const timeFontFileInputEl = document.getElementById("timeFontFileInput");
const textFontFileInputEl = document.getElementById("textFontFileInput");
const pickTimeFontBtnEl = document.getElementById("pickTimeFontBtn");
const pickTextFontBtnEl = document.getElementById("pickTextFontBtn");
const resetBtnEl = document.getElementById("resetFontBtn");
const resetAllBtnEl = document.getElementById("resetAllBtn");
const statusEl = document.getElementById("fontStatus");
const fontSettingsEnabledEl = document.getElementById("fontSettingsEnabled");
const timeSettingsEnabledEl = document.getElementById("timeSettingsEnabled");
const timeControlsEl = document.getElementById("timeControls");
const fontControlsEl = document.getElementById("fontControls");
const fontSectionEl = document.getElementById("fontSection");
const textSectionEl = document.getElementById("textSection");
const textControlsEl = document.getElementById("textControls");
const hourModeEl = document.getElementById("hourMode");
const showSecondsEl = document.getElementById("showSeconds");
const showMeridiemEl = document.getElementById("showMeridiem");
const blinkColonEl = document.getElementById("blinkColon");
const blinkColonLabelEl = document.querySelector('label[for="blinkColon"]');
const timeDraggableEl = document.getElementById("timeDraggable");
const resetTimePosBtnEl = document.getElementById("resetTimePosBtn");
const fontFamilyEl = document.getElementById("fontFamily");
const textDefaultFontEl = document.getElementById("textDefaultFont");
const fontWeightEl = document.getElementById("fontWeight");
const fontSizeEl = document.getElementById("fontSize");
const lineHeightEl = document.getElementById("lineHeight");
const letterSpacingEl = document.getElementById("letterSpacing");
const fontStyleEl = document.getElementById("fontStyle");
const textColorEl = document.getElementById("textColor");
const bgColorEl = document.getElementById("bgColor");
const textSettingsEnabledEl = document.getElementById("textSettingsEnabled");
const customTextInputEl = document.getElementById("customTextInput");
const textSizeEl = document.getElementById("textSize");
const textTrackingEl = document.getElementById("textTracking");
const textLineHeightEl = document.getElementById("textLineHeight");
const textWeightEl = document.getElementById("textWeight");
const textStyleEl = document.getElementById("textStyle");
const textFillColorEl = document.getElementById("textFillColor");
const addTextBtnEl = document.getElementById("addTextBtn");
const undoBtnEl = document.getElementById("undoBtn");
const textHistoryEl = document.getElementById("textHistory");

let activeTimeFontName = null;
let activeTextFontName = null;
let activeTimeFontUrl = null;
let activeTextFontUrl = null;
let hideHamburgerTimer = null;
let nextTextId = 1;
const textHistory = [];
const undoStack = [];
const MAX_UNDO = 80;
let isRestoringUndo = false;
let clockDragged = false;

function updateTime(){
 if (!timeSettingsEnabledEl.checked) return;

 const now = new Date();
 const use12Hour = hourModeEl.value === "12";
 const hourRaw = now.getHours();
 const hour12 = hourRaw % 12 || 12;
 const hour = use12Hour ? String(hour12).padStart(2, "0") : String(hourRaw).padStart(2, "0");
 const minute = String(now.getMinutes()).padStart(2, "0");
 const second = String(now.getSeconds()).padStart(2, "0");
 timeHourEl.textContent = hour;
 timeMinuteEl.textContent = minute;
 timeSecondsEl.textContent = second;
 timeMeridiemEl.textContent = use12Hour ? (hourRaw >= 12 ? "PM" : "AM") : "";
 timeMeridiemEl.style.display = use12Hour ? "inline-block" : "none";
 const shouldBlinkMainColon = blinkColonEl.value === "on";
 const mainColonVisible = !shouldBlinkMainColon || Number(second) % 2 === 0;
 timeMainColonEl.style.opacity = mainColonVisible ? "1" : "0";
 const showSeconds = showSecondsEl.value === "on";
 timeSecondsEl.style.display = showSeconds ? "inline-block" : "none";
 timeColonEl.style.display = showSeconds ? "inline-block" : "none";
 if (use12Hour) {
  timeMeridiemEl.style.display = showMeridiemEl.value === "on" ? "inline-block" : "none";
 }

}

setInterval(updateTime,1000);


function applyTextSettings() {
 const useFontSettings = fontSettingsEnabledEl.checked;

 if (useFontSettings) {
  const selectedFamily = activeTimeFontName
   ? `"${activeTimeFontName}", ${fontFamilyEl.value}`
   : fontFamilyEl.value;
  const timeFontSize = Math.max(1, Number(fontSizeEl.value) || 120);
  const timeTracking = `${letterSpacingEl.value}px`;
  clockEl.style.fontFamily = selectedFamily;
  clockEl.style.fontWeight = fontWeightEl.value;
  clockEl.style.fontSize = `${timeFontSize}px`;
  clockEl.style.lineHeight = lineHeightEl.value;
  clockEl.style.letterSpacing = timeTracking;

  clockEl.style.fontStyle = fontStyleEl.value;
  clockEl.style.color = textColorEl.value;
 } else {
  clockEl.style.fontFamily = "Arial, sans-serif";
  clockEl.style.fontWeight = "400";
  clockEl.style.fontSize = "120px";
  clockEl.style.lineHeight = "1";
  clockEl.style.letterSpacing = "0px";

  clockEl.style.fontStyle = "normal";
  clockEl.style.color = "#ffffff";
  document.body.style.backgroundColor = "#000000";
 }

 if (useFontSettings) {
  document.body.style.backgroundColor = bgColorEl.value;
 }
 textHistory.forEach((item) => applyHistoryStyle(item.id));
}

function syncSectionStates() {
 timeControlsEl.disabled = !timeSettingsEnabledEl.checked;
 fontControlsEl.disabled = !fontSettingsEnabledEl.checked;
 textControlsEl.disabled = !textSettingsEnabledEl.checked;
 pickTimeFontBtnEl.disabled = !fontSettingsEnabledEl.checked;
 pickTextFontBtnEl.disabled = !fontSettingsEnabledEl.checked;
 resetBtnEl.disabled = !fontSettingsEnabledEl.checked;
 addTextBtnEl.disabled = !textSettingsEnabledEl.checked;
 fontSectionEl.classList.toggle("disabled", !fontSettingsEnabledEl.checked);
 timeControlsEl.closest(".panel-section").classList.toggle("disabled", !timeSettingsEnabledEl.checked);
 textSectionEl.classList.toggle("disabled", !textSettingsEnabledEl.checked);
 document.querySelectorAll(".floating-text").forEach((el) => {
  el.style.display = textSettingsEnabledEl.checked ? "block" : "none";
 });
 clockEl.style.display = timeSettingsEnabledEl.checked ? "block" : "none";
 clockEl.classList.toggle("draggable", timeSettingsEnabledEl.checked && timeDraggableEl.value === "on");
 if (!timeSettingsEnabledEl.checked || timeDraggableEl.value === "off") {
  clockEl.style.cursor = "default";
 }
 if (!timeSettingsEnabledEl.checked) {
  clockEl.style.pointerEvents = "none";
 } else {
  clockEl.style.pointerEvents = "auto";
 }
 syncTimeOptionVisibility();
}

function syncTimeOptionVisibility() {
 const showBlinkOption = timeSettingsEnabledEl.checked && showSecondsEl.value === "off";
 blinkColonLabelEl.style.display = showBlinkOption ? "" : "none";
 blinkColonEl.style.display = showBlinkOption ? "" : "none";
 if (!showBlinkOption && blinkColonEl.value === "on") {
  blinkColonEl.value = "off";
 }
}

function openSettingsPanel() {
 controlsEl.classList.add("open");
 controlsEl.setAttribute("aria-hidden", "false");
 document.body.classList.add("panel-open");
 hamburgerBtnEl.setAttribute("aria-expanded", "true");
 hamburgerBtnEl.classList.remove("visible");
 panelBackdropEl.hidden = false;
}

function closeSettingsPanel() {
 controlsEl.classList.remove("open");
 controlsEl.setAttribute("aria-hidden", "true");
 document.body.classList.remove("panel-open");
 hamburgerBtnEl.setAttribute("aria-expanded", "false");
 panelBackdropEl.hidden = true;
 scheduleHamburgerHide();
}

function scheduleHamburgerHide() {
 clearTimeout(hideHamburgerTimer);
 if (controlsEl.classList.contains("open")) {
  hamburgerBtnEl.classList.remove("visible");
  return;
 }
 hideHamburgerTimer = setTimeout(() => {
  hamburgerBtnEl.classList.remove("visible");
 }, 1400);
}

function revealHamburger() {
 if (controlsEl.classList.contains("open")) return;
 hamburgerBtnEl.classList.add("visible");
 scheduleHamburgerHide();
}

function cleanupFontUrl(kind) {
 if (kind === "time" && activeTimeFontUrl) {
  URL.revokeObjectURL(activeTimeFontUrl);
  activeTimeFontUrl = null;
 }
 if (kind === "text" && activeTextFontUrl) {
  URL.revokeObjectURL(activeTextFontUrl);
  activeTextFontUrl = null;
 }
}

async function loadSelectedFont(file, kind) {
 try {
  cleanupFontUrl(kind);
  const objectUrl = URL.createObjectURL(file);
  const fontName = `${kind}-custom-font-${Date.now()}`;
  const fontFace = new FontFace(fontName, `url(${objectUrl})`);
  const loadedFont = await fontFace.load();
  document.fonts.add(loadedFont);
  if (kind === "time") {
   activeTimeFontName = fontName;
   activeTimeFontUrl = objectUrl;
  } else {
   activeTextFontName = fontName;
   activeTextFontUrl = objectUrl;
  }
  applyTextSettings();
  renderTextHistory();
  statusEl.textContent = `${kind === "time" ? "Time" : "Text"} font loaded: ${file.name}`;
 } catch (error) {
  statusEl.textContent = "Could not load font file";
 }
}

pickTimeFontBtnEl.addEventListener("click", () => {
 timeFontFileInputEl.click();
});

pickTextFontBtnEl.addEventListener("click", () => {
 textFontFileInputEl.click();
});

timeFontFileInputEl.addEventListener("change", async (event) => {
 const file = event.target.files?.[0];
 if (!file) return;
 await loadSelectedFont(file, "time");
 timeFontFileInputEl.value = "";
});

textFontFileInputEl.addEventListener("change", async (event) => {
 const file = event.target.files?.[0];
 if (!file) return;
 await loadSelectedFont(file, "text");
 textFontFileInputEl.value = "";
});

resetBtnEl.addEventListener("click", () => {
 cleanupFontUrl("time");
 cleanupFontUrl("text");
 activeTimeFontName = null;
 activeTextFontName = null;
 applyTextSettings();
 renderTextHistory();
 statusEl.textContent = "Default font restored";
});

resetAllBtnEl.addEventListener("click", () => {
 cleanupFontUrl("time");
 cleanupFontUrl("text");
 activeTimeFontName = null;
 activeTextFontName = null;
 timeSettingsEnabledEl.checked = true;
 hourModeEl.value = "12";
 showSecondsEl.value = "off";
 showMeridiemEl.value = "off";
 blinkColonEl.value = "off";
 timeDraggableEl.value = "off";
 fontSettingsEnabledEl.checked = true;
 textSettingsEnabledEl.checked = true;
 fontFamilyEl.value = "Arial, sans-serif";
 textDefaultFontEl.value = "Arial, sans-serif";
 textSizeEl.value = "38";
 textTrackingEl.value = "0";
 textLineHeightEl.value = "1.1";
 textWeightEl.value = "400";
 textStyleEl.value = "normal";
 textFillColorEl.value = "#ffffff";
 fontWeightEl.value = "400";
 fontSizeEl.value = "120";
 lineHeightEl.value = "1";
 letterSpacingEl.value = "0";
 fontStyleEl.value = "normal";
 textColorEl.value = "#ffffff";
 bgColorEl.value = "#000000";
 statusEl.textContent = "All settings reset";
 syncSectionStates();
 applyTextSettings();
 updateTime();
 resetClockPosition();
});

function makeTextDraggable(element) {
 let pointerOffsetX = 0;
 let pointerOffsetY = 0;

 const onPointerMove = (event) => {
  element.style.left = `${event.clientX - pointerOffsetX}px`;
  element.style.top = `${event.clientY - pointerOffsetY}px`;
 };

 const onPointerUp = () => {
  document.removeEventListener("pointermove", onPointerMove);
  document.removeEventListener("pointerup", onPointerUp);
 };

 element.addEventListener("pointerdown", (event) => {
  if (event.button !== 0) return;
  if (event.target.closest(".floating-resize-handle")) return;
  if (element.classList.contains("editing")) return;
  pushUndoState();
  setSelectedFloatingText(element);
  pointerOffsetX = event.clientX - element.offsetLeft;
  pointerOffsetY = event.clientY - element.offsetTop;
  document.addEventListener("pointermove", onPointerMove);
  document.addEventListener("pointerup", onPointerUp);
 });
}

function makeTextResizable(wrapperEl, contentEl, historyId) {
 const handleEl = wrapperEl.querySelector(".floating-resize-handle");
 if (!handleEl) return;

 handleEl.addEventListener("pointerdown", (event) => {
  event.stopPropagation();
  event.preventDefault();
  const startY = event.clientY;
  const startSize = parseFloat(window.getComputedStyle(contentEl).fontSize) || 38;

 const onPointerMove = (moveEvent) => {
   if (!wrapperEl.dataset.undoCaptured) {
    pushUndoState();
    wrapperEl.dataset.undoCaptured = "1";
   }
   const delta = moveEvent.clientY - startY;
   const nextSize = Math.max(10, Math.round(startSize + delta));
   contentEl.style.fontSize = `${nextSize}px`;
   const historyItem = textHistory.find((item) => item.id === historyId);
   if (historyItem) {
    historyItem.fontSize = nextSize;
   }
   renderTextHistory();
  };

 const onPointerUp = () => {
   delete wrapperEl.dataset.undoCaptured;
   document.removeEventListener("pointermove", onPointerMove);
   document.removeEventListener("pointerup", onPointerUp);
  };

  document.addEventListener("pointermove", onPointerMove);
  document.addEventListener("pointerup", onPointerUp);
 });
}

function resetClockPosition() {
 clockDragged = false;
 clockEl.style.left = "50%";
 clockEl.style.top = "50%";
 clockEl.style.transform = "translate(-50%, -50%)";
}

function setupClockDrag() {
 let pointerOffsetX = 0;
 let pointerOffsetY = 0;

 const onPointerMove = (event) => {
  clockDragged = true;
  clockEl.style.transform = "none";
  clockEl.style.left = `${event.clientX - pointerOffsetX}px`;
  clockEl.style.top = `${event.clientY - pointerOffsetY}px`;
 };

 const onPointerUp = () => {
  document.removeEventListener("pointermove", onPointerMove);
  document.removeEventListener("pointerup", onPointerUp);
 };

 clockEl.addEventListener("pointerdown", (event) => {
  if (event.button !== 0) return;
  if (!(timeSettingsEnabledEl.checked && timeDraggableEl.value === "on")) return;
  const rect = clockEl.getBoundingClientRect();
  if (!clockDragged) {
   clockEl.style.transform = "none";
   clockEl.style.left = `${rect.left}px`;
   clockEl.style.top = `${rect.top}px`;
   clockDragged = true;
  }
  pointerOffsetX = event.clientX - clockEl.offsetLeft;
  pointerOffsetY = event.clientY - clockEl.offsetTop;
  document.addEventListener("pointermove", onPointerMove);
  document.addEventListener("pointerup", onPointerUp);
 });
}

function addFloatingText() {
 if (!textSettingsEnabledEl.checked) return;
 const content = customTextInputEl.value.trim();
 if (!content) return;
 pushUndoState();
 const defaultFontSize = Math.max(10, Number(textSizeEl.value) || 38);
 const historyItem = { id: nextTextId++, content, fontSize: defaultFontSize, fontFamily: "__text_default__" };
 textHistory.unshift(historyItem);
 renderTextHistory();
 placeHistoryText(historyItem.id, false);
 customTextInputEl.value = "";
}

function placeHistoryText(historyId, shouldSnapshot = true) {
 const historyItem = textHistory.find((item) => item.id === historyId);
 if (!historyItem) return;
 if (shouldSnapshot) {
  pushUndoState();
 }
 const textEl = document.createElement("div");
 textEl.className = "floating-text";
 textEl.dataset.historyId = String(historyItem.id);
 const contentEl = document.createElement("span");
 contentEl.className = "floating-text-content";
 contentEl.textContent = historyItem.content;
 contentEl.style.fontSize = `${historyItem.fontSize || 38}px`;
 const handleEl = document.createElement("div");
 handleEl.className = "floating-resize-handle";
 textEl.appendChild(contentEl);
 textEl.appendChild(handleEl);
 textEl.style.left = `${Math.max(16, (window.innerWidth / 2) - 80)}px`;
 textEl.style.top = `${Math.max(16, (window.innerHeight / 2) - 20)}px`;
 document.body.appendChild(textEl);
 makeTextDraggable(textEl);
 makeTextResizable(textEl, contentEl, historyItem.id);
 makeTextEditable(textEl, contentEl, historyItem.id);
 applyTextSettings();
 applyHistoryStyle(historyItem.id);
 setSelectedFloatingText(textEl);
}

function deleteHistoryText(historyId) {
 pushUndoState();
 const idx = textHistory.findIndex((item) => item.id === historyId);
 if (idx === -1) return;
 textHistory.splice(idx, 1);
 document.querySelectorAll(`.floating-text[data-history-id="${historyId}"]`).forEach((el) => {
  el.remove();
 });
 renderTextHistory();
}

function renderTextHistory() {
 textHistoryEl.textContent = "";
 if (textHistory.length === 0) {
  const emptyEl = document.createElement("p");
  emptyEl.className = "history-empty";
  emptyEl.textContent = "No text history yet.";
  textHistoryEl.appendChild(emptyEl);
  return;
 }

 textHistory.forEach((item) => {
  const itemEl = document.createElement("div");
  itemEl.className = "text-history-item";

  const contentEl = document.createElement("span");
  contentEl.className = "history-content";
  contentEl.textContent = item.content;

  const actionsEl = document.createElement("div");
  actionsEl.className = "history-actions";

  const placeBtn = document.createElement("button");
  placeBtn.type = "button";
  placeBtn.dataset.action = "place";
  placeBtn.dataset.id = String(item.id);
  placeBtn.textContent = "Add";

  const deleteBtn = document.createElement("button");
  deleteBtn.type = "button";
  deleteBtn.dataset.action = "delete";
  deleteBtn.dataset.id = String(item.id);
  deleteBtn.textContent = "Delete";

  const fontSelect = document.createElement("select");
  fontSelect.className = "history-font";
  fontSelect.dataset.action = "set-font";
  fontSelect.dataset.id = String(item.id);
  buildHistoryFontOptions(fontSelect, item.fontFamily || "__text_default__");

  const sizeInput = document.createElement("input");
  sizeInput.className = "history-size";
  sizeInput.type = "number";
  sizeInput.min = "10";
  sizeInput.max = "420";
  sizeInput.value = String(item.fontSize || 38);
  sizeInput.dataset.action = "set-size";
  sizeInput.dataset.id = String(item.id);

  actionsEl.appendChild(placeBtn);
  actionsEl.appendChild(deleteBtn);
  actionsEl.appendChild(fontSelect);
  actionsEl.appendChild(sizeInput);
  itemEl.appendChild(contentEl);
  itemEl.appendChild(actionsEl);
  textHistoryEl.appendChild(itemEl);
 });
}

function buildHistoryFontOptions(selectEl, selectedValue) {
 const options = [
  { label: "Text Default", value: "__text_default__" },
  { label: "Arial", value: "Arial, sans-serif" },
  { label: "Helvetica Neue", value: "'Helvetica Neue', Helvetica, Arial, sans-serif" },
  { label: "Georgia", value: "Georgia, serif" },
  { label: "Times New Roman", value: "'Times New Roman', serif" },
  { label: "Courier New", value: "'Courier New', monospace" }
 ];
 if (activeTextFontName) {
  options.unshift({ label: "Text Custom", value: `"${activeTextFontName}", Arial, sans-serif` });
 }
 if (activeTimeFontName) {
  options.unshift({ label: "Time Custom", value: `"${activeTimeFontName}", Arial, sans-serif` });
 }
 selectEl.textContent = "";
 options.forEach((option) => {
  const optionEl = document.createElement("option");
  optionEl.textContent = option.label;
  optionEl.value = option.value;
  if (option.value === selectedValue) {
   optionEl.selected = true;
  }
  selectEl.appendChild(optionEl);
 });
}

function getHistoryItemById(historyId) {
 return textHistory.find((item) => item.id === historyId);
}

function captureTextState() {
 return {
  history: textHistory.map((item) => ({ ...item })),
  nextTextId,
  blocks: Array.from(document.querySelectorAll(".floating-text")).map((el) => ({
   historyId: Number(el.dataset.historyId),
   left: el.style.left,
   top: el.style.top,
   selected: el.classList.contains("selected")
  }))
 };
}

function updateUndoButton() {
 undoBtnEl.disabled = undoStack.length === 0;
}

function pushUndoState() {
 if (isRestoringUndo) return;
 undoStack.push(captureTextState());
 if (undoStack.length > MAX_UNDO) {
  undoStack.shift();
 }
 updateUndoButton();
}

function restoreTextState(state) {
 isRestoringUndo = true;
 textHistory.length = 0;
 state.history.forEach((item) => textHistory.push({ ...item }));
 nextTextId = state.nextTextId;
 document.querySelectorAll(".floating-text").forEach((el) => el.remove());
 state.blocks.forEach((block) => {
  const historyItem = getHistoryItemById(block.historyId);
  if (!historyItem) return;
  const textEl = document.createElement("div");
  textEl.className = "floating-text";
  textEl.dataset.historyId = String(historyItem.id);
  const contentEl = document.createElement("span");
  contentEl.className = "floating-text-content";
  contentEl.textContent = historyItem.content;
  contentEl.style.fontSize = `${historyItem.fontSize || 38}px`;
  const handleEl = document.createElement("div");
  handleEl.className = "floating-resize-handle";
  textEl.appendChild(contentEl);
  textEl.appendChild(handleEl);
  textEl.style.left = block.left;
  textEl.style.top = block.top;
  document.body.appendChild(textEl);
  makeTextDraggable(textEl);
  makeTextResizable(textEl, contentEl, historyItem.id);
  makeTextEditable(textEl, contentEl, historyItem.id);
  if (block.selected) {
   setSelectedFloatingText(textEl);
  }
 });
 renderTextHistory();
 applyTextSettings();
 syncSectionStates();
 isRestoringUndo = false;
}

function undoLastAction() {
 const state = undoStack.pop();
 if (!state) return;
 restoreTextState(state);
 updateUndoButton();
}

function applyHistoryStyle(historyId) {
 const historyItem = getHistoryItemById(historyId);
 if (!historyItem) return;
 document.querySelectorAll(`.floating-text[data-history-id="${historyId}"]`).forEach((el) => {
  const contentEl = el.querySelector(".floating-text-content");
  if (!contentEl) return;
  const textDefaultResolved = activeTextFontName
   ? `"${activeTextFontName}", ${textDefaultFontEl.value}`
   : textDefaultFontEl.value;
 const family = historyItem.fontFamily && historyItem.fontFamily !== "__text_default__"
   ? historyItem.fontFamily
   : textDefaultResolved;
  const resolvedFontSize = Math.max(10, Number(historyItem.fontSize || Number(textSizeEl.value) || 38));
  const textTracking = `${textTrackingEl.value}px`;
  contentEl.style.fontFamily = family;
  contentEl.style.fontWeight = textWeightEl.value;
  contentEl.style.fontStyle = textStyleEl.value;
  contentEl.style.letterSpacing = textTracking;
  contentEl.style.lineHeight = textLineHeightEl.value;
  contentEl.style.color = textFillColorEl.value;
  contentEl.style.fontSize = `${resolvedFontSize}px`;
 });
}

function makeTextEditable(wrapperEl, contentEl, historyId) {
 contentEl.addEventListener("dblclick", () => {
  wrapperEl.classList.add("editing");
  contentEl.setAttribute("contenteditable", "true");
  contentEl.focus();
  document.getSelection()?.selectAllChildren(contentEl);
 });

 const saveEdit = () => {
  const historyItem = getHistoryItemById(historyId);
  if (!historyItem) return;
  const nextText = contentEl.textContent.trim();
 if (!nextText) {
  contentEl.textContent = historyItem.content;
 } else {
   if (nextText !== historyItem.content) {
    pushUndoState();
   }
   historyItem.content = nextText;
   document.querySelectorAll(`.floating-text[data-history-id="${historyId}"] .floating-text-content`).forEach((el) => {
    el.textContent = nextText;
   });
   renderTextHistory();
  }
  contentEl.removeAttribute("contenteditable");
  wrapperEl.classList.remove("editing");
 };

 contentEl.addEventListener("blur", saveEdit);
 contentEl.addEventListener("keydown", (event) => {
  if (event.key === "Enter") {
   event.preventDefault();
   contentEl.blur();
  }
  if (event.key === "Escape") {
   event.preventDefault();
   contentEl.textContent = getHistoryItemById(historyId)?.content || contentEl.textContent;
   contentEl.blur();
  }
 });
}

function setSelectedFloatingText(target) {
 document.querySelectorAll(".floating-text.selected").forEach((el) => {
  if (el !== target) el.classList.remove("selected");
 });
 target.classList.add("selected");
}

addTextBtnEl.addEventListener("click", addFloatingText);
undoBtnEl.addEventListener("click", undoLastAction);
customTextInputEl.addEventListener("keydown", (event) => {
 if (event.key === "Enter") {
  addFloatingText();
 }
});
textHistoryEl.addEventListener("click", (event) => {
 const target = event.target.closest("button[data-action]");
 if (!target || !textSettingsEnabledEl.checked) return;
 const historyId = Number(target.dataset.id);
 const action = target.dataset.action;
 if (action === "place") {
  placeHistoryText(historyId);
  return;
 }
 if (action === "delete") {
  deleteHistoryText(historyId);
 }
});
textHistoryEl.addEventListener("input", (event) => {
 const target = event.target;
 if (!target || !textSettingsEnabledEl.checked) return;
 const historyId = Number(target.dataset.id);
 const action = target.dataset.action;
 const historyItem = getHistoryItemById(historyId);
 if (!historyItem) return;
 if (action === "set-font") {
  pushUndoState();
  historyItem.fontFamily = target.value;
  applyHistoryStyle(historyId);
  return;
 }
 if (action === "set-size") {
  pushUndoState();
  const nextSize = Math.max(10, Number(target.value) || 10);
  historyItem.fontSize = nextSize;
  applyHistoryStyle(historyId);
 }
});
document.addEventListener("pointermove", (event) => {
 const nearDistance = 18;
 document.querySelectorAll(".floating-text").forEach((el) => {
  const rect = el.getBoundingClientRect();
  const withinX = event.clientX >= rect.left - nearDistance && event.clientX <= rect.right + nearDistance;
  const withinY = event.clientY >= rect.top - nearDistance && event.clientY <= rect.bottom + nearDistance;
  el.classList.toggle("near", withinX && withinY);
 });
}, { passive: true });
document.addEventListener("pointerdown", (event) => {
 const wrapper = event.target.closest(".floating-text");
 if (wrapper) {
  setSelectedFloatingText(wrapper);
  return;
 }
 document.querySelectorAll(".floating-text.selected").forEach((el) => el.classList.remove("selected"));
});

[
 timeSettingsEnabledEl,
 hourModeEl,
 showSecondsEl,
 showMeridiemEl,
 blinkColonEl,
 timeDraggableEl,
 fontSettingsEnabledEl,
 textSettingsEnabledEl,
 fontFamilyEl,
 textDefaultFontEl,
 textSizeEl,
 textTrackingEl,
 textLineHeightEl,
 textWeightEl,
 textStyleEl,
 textFillColorEl,
 fontWeightEl,
 fontSizeEl,
 lineHeightEl,
 letterSpacingEl,
 fontStyleEl,
 textColorEl,
 bgColorEl
].forEach((el) => {
 el.addEventListener("input", () => {
  if (el === timeDraggableEl && timeDraggableEl.value === "off") {
   resetClockPosition();
  }
  syncSectionStates();
  applyTextSettings();
  updateTime();
  textHistory.forEach((item) => applyHistoryStyle(item.id));
 });
});

hamburgerBtnEl.addEventListener("click", () => {
 if (controlsEl.classList.contains("open")) {
  closeSettingsPanel();
  return;
 }
 openSettingsPanel();
});
closePanelBtnEl.addEventListener("click", closeSettingsPanel);
panelBackdropEl.addEventListener("click", closeSettingsPanel);
resetTimePosBtnEl.addEventListener("click", resetClockPosition);
document.addEventListener("keydown", (event) => {
 const target = event.target;
 if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "z") {
  if (!target?.isContentEditable) {
   event.preventDefault();
   undoLastAction();
  }
  return;
 }
 revealHamburger();
 if (event.key === "Escape") {
  closeSettingsPanel();
 }
});
document.addEventListener("mousemove", () => {
 revealHamburger();
}, { passive: true });
document.addEventListener("touchstart", () => {
 revealHamburger();
}, { passive: true });

applyTextSettings();
updateTime();
syncSectionStates();
renderTextHistory();
setupClockDrag();
resetClockPosition();
scheduleHamburgerHide();
updateUndoButton();
</script>

</body>
</html>
